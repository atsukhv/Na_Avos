<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>На авось</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0d0d0f;
  --bg2:     #1a1a1f;
  --bg3:     #222228;
  --border:  #2a2a30;
  --text:    #f0ede8;
  --muted:   #555560;
  --muted2:  #a0a0b0;
  --accent:  #ff6b2b;
  --accent2: #ff3366;
  --grad:    linear-gradient(135deg,#ff6b2b,#ff3366);
  --fh:      'Unbounded',sans-serif;
  --fb:      'Inter',sans-serif;
  --r:       12px;
}

html, body {
  height: 100vh; width: 100vw;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  user-select: none;
}
input, textarea { user-select: text; }

/* ── СЕТКА ПРИЛОЖЕНИЯ ───────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 56px 1fr;   /* шапка + контент */
  grid-template-columns: 220px 1fr;
  height: 100vh;
}

/* ── ШАПКА ─────────────────────────────────────────────── */
#header {
  grid-column: 1 / -1;
  grid-row: 1;
  display: flex;
  align-items: stretch;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  gap: 20px;
}
#logo {
  font-family: var(--fh);
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg,#ff6b2b 0%,#ff3366 55%,#a855f7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: flex; align-items: center;
  padding-right: 16px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
#tabs { display:flex; gap:2px; align-items: stretch; }
.tab-btn {
  font-family: var(--fh); font-size:11px; font-weight:700;
  letter-spacing:.06em; color:var(--muted);
  background:none; border:none;
  border-bottom: 2px solid transparent;
  padding: 0 18px;
  cursor:pointer; transition:color .2s;
  white-space:nowrap;
}
.tab-btn:hover  { color:var(--muted2); }
.tab-btn.active { color:var(--text); border-bottom-color:var(--accent); }

/* ── САЙДБАР ────────────────────────────────────────────── */
#sidebar {
  grid-column: 1; grid-row: 2;
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 6px;
}
.slabel {
  font-family:var(--fh); font-size:10px; font-weight:700;
  letter-spacing:.14em; color:var(--muted);
  text-transform:uppercase; margin:8px 0 4px;
}
.sl-item {
  padding: 7px 11px; border-radius:9px;
  font-size:13px; font-weight:500;
  cursor:pointer; color:var(--muted2);
  transition: all .15s;
  display:flex; justify-content:space-between; align-items:center;
}
.sl-item:hover  { background:var(--bg3); color:var(--text); }
.sl-item.active { background:var(--bg2); color:var(--text); }
.sl-cnt { font-size:10px; color:var(--accent); font-family:var(--fh); }
#sb-items { background:var(--bg2); border-radius:var(--r); padding:6px; max-height:260px; overflow-y:auto; }
.sb-row { display:flex; justify-content:space-between; padding:4px 8px; font-size:12px; color:var(--muted2); border-radius:6px; }
.sb-row:hover { background:var(--bg3); }
.sb-w { font-size:10px; color:var(--accent); font-family:var(--fh); }

/* ── КОНТЕНТ ─────────────────────────────────────────────── */
#content {
  grid-column: 2; grid-row: 2;
  overflow: hidden;     /* панели сами управляют скроллом */
  position: relative;
}

/* Панели: все скрыты, active показана */
.panel {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 28px 36px;
}
.panel.active { display: block; }

/* ── КОЛЕСО ─────────────────────────────────────────────── */
#wheel-panel {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  padding: 24px 36px;
}
#wheel-panel.active { display: flex; }

#wheel-status {
  width: 100%; max-width: 560px;
  min-height: 64px;
  display:flex; align-items:center; justify-content:center;
}
.ws-idle  { color:var(--muted); font-family:var(--fh); font-size:12px; letter-spacing:.06em; }
.ws-spin  {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:14px 32px;
  color:var(--muted); font-family:var(--fh); font-size:12px;
  animation:pulse 1.2s ease-in-out infinite;
}
.ws-winner {
  width:100%;
  background:linear-gradient(135deg,var(--bg2),#16161a);
  border:1px solid var(--border); border-radius:14px;
  padding:14px 32px; text-align:center;
}
.ws-wlabel { font-size:10px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:5px; }
.ws-wname  { font-family:var(--fh); font-size:22px; font-weight:900; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; word-break:break-word; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

#wheel-wrap { position:relative; display:inline-flex; align-items:center; justify-content:center; }
#wheel-ptr  {
  position:absolute; top:50%; right:-14px; transform:translateY(-50%);
  width:0; height:0;
  border-top:16px solid transparent; border-bottom:16px solid transparent;
  border-right:32px solid var(--accent2);
  filter:drop-shadow(0 0 10px rgba(255,51,102,.8));
}
#wheel-btn { width: 100%; max-width: 560px; }

/* ── МОНЕТКА ────────────────────────────────────────────── */
#coin-panel {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  min-height: calc(100vh - 56px);
}
#coin-panel.active { display: flex; }

#coin-face {
  width:180px; height:180px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:80px;
  background:radial-gradient(circle at 35% 35%,#2a2a35,#16161a);
  border:3px solid var(--border);
  box-shadow:0 0 50px rgba(255,107,43,.15),inset 0 0 30px rgba(0,0,0,.5);
}
#coin-face.flipping { animation:flipcoin .75s ease forwards; }
@keyframes flipcoin {
  0%  { transform:rotateY(0) scale(1); }
  40% { transform:rotateY(540deg) scale(1.1); }
  100%{ transform:rotateY(1080deg) scale(1); }
}
#coin-result {
  font-family:var(--fh); font-size:24px; font-weight:900;
  background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  min-height:32px; opacity:0; transition:opacity .5s;
}
#coin-result.show { opacity:1; }
#coin-btn-wrap { width:280px; }

/* ── СПИСКИ ─────────────────────────────────────────────── */
#lists-panel {
  display: none;
}
#lists-panel.active {
  display: block;    /* скролл через .panel */
}
#lists-inner {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 40px;
  max-width: 960px;
}

.sec-title { font-family:var(--fh); font-size:13px; font-weight:700; color:var(--text); margin-bottom:16px; }
.frow { margin-bottom:12px; }
.flabel { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; display:block; }

/* кастомный дропдаун */
.csel { position:relative; width:100%; }
.csel-trigger {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  color:var(--text); font-family:var(--fb); font-size:13px;
  padding:10px 36px 10px 14px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  transition:border-color .2s; user-select:none; position:relative;
}
.csel-trigger:hover { border-color:var(--muted); }
.csel-trigger.open  { border-color:var(--accent); border-radius:var(--r) var(--r) 0 0; }
.csel-arrow { font-size:10px; color:var(--muted); transition:transform .2s; }
.csel-trigger.open .csel-arrow { transform:rotate(180deg); }
.csel-drop {
  display:none; position:absolute; top:100%; left:0; right:0;
  background:var(--bg2); border:1px solid var(--accent); border-top:none;
  border-radius:0 0 var(--r) var(--r); z-index:200;
  max-height:200px; overflow-y:auto;
}
.csel-drop.open { display:block; }
.csel-opt { padding:9px 14px; font-size:13px; color:var(--muted2); cursor:pointer; transition:background .1s,color .1s; }
.csel-opt:hover    { background:var(--bg3); color:var(--text); }
.csel-opt.selected { background:var(--bg3); color:var(--text); }

/* таблица элементов редактора */
#edit-rows { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.erow { display:grid; grid-template-columns:1fr 76px 36px; gap:6px; align-items:center; }
.erow input[type=number] { text-align:center; }
.add-row { display:grid; grid-template-columns:1fr 76px auto; gap:6px; align-items:center; margin-bottom:16px; }

#edit-section { display:none; }
#no-lists-hint { color:var(--muted); font-size:13px; padding:8px 0; }

/* Кнопки */
.btn {
  font-family:var(--fh); font-size:12px; font-weight:700; letter-spacing:.04em;
  color:#fff; background:var(--grad); border:none; border-radius:var(--r);
  padding:13px 24px; cursor:pointer; transition:all .2s;
  box-shadow:0 4px 20px rgba(255,107,43,.3); white-space:nowrap;
}
.btn:hover   { transform:translateY(-2px); box-shadow:0 8px 28px rgba(255,107,43,.5); }
.btn:active  { transform:translateY(0); }
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
.btn.ghost   { background:var(--bg2); box-shadow:none; border:1px solid var(--border); color:var(--muted2); }
.btn.ghost:hover { background:var(--bg3); color:var(--text); box-shadow:none; }
.btn.danger  { background:transparent; border:1px solid #3a1a1a; color:#ff4466; box-shadow:none; }
.btn.danger:hover { background:#1a0a0a; box-shadow:none; }
.btn.sm { font-size:11px; padding:8px 14px; }

/* Инпут */
.inp {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  color:var(--text); font-family:var(--fb); font-size:13px;
  padding:10px 14px; outline:none; transition:border-color .2s; width:100%;
}
.inp:focus { border-color:var(--accent); }
.inp::placeholder { color:var(--muted); }
textarea.inp { resize:vertical; min-height:120px; }

/* иконка-кнопка */
.ibtn {
  background:transparent; border:1px solid var(--border); border-radius:8px;
  color:var(--muted2); font-size:14px;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s;
}
.ibtn:hover { background:#2a1010; border-color:#4a2020; color:#ff4466; }

hr.div { border:none; border-top:1px solid var(--border); margin:18px 0; }

/* Тост */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  padding:11px 22px; font-size:13px; font-weight:500; color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:9999; pointer-events:none; white-space:nowrap; max-width:700px; text-overflow:ellipsis; overflow:hidden;
}
#toast.show    { transform:translateX(-50%) translateY(0); }
#toast.success { border-color:#1a4a2a; color:#4ade80; }
#toast.error   { border-color:#3a1a1a; color:#ff4466; }
</style>
</head>
<body>
<div id="app">

  <!-- ШАПКА -->
  <header id="header">
    <div id="logo">На авось</div>
    <nav id="tabs">
      <button class="tab-btn active" data-tab="wheel">🎡&nbsp; Колесо</button>
      <button class="tab-btn"        data-tab="coin" >🪙&nbsp; Монетка</button>
      <button class="tab-btn"        data-tab="lists">📂&nbsp; Списки</button>
    </nav>
  </header>

  <!-- САЙДБАР -->
  <aside id="sidebar">
    <div class="slabel">Списки</div>
    <div id="sb-lists"><div style="color:var(--muted);font-size:12px">Загрузка...</div></div>
    <div class="slabel">Элементы</div>
    <div id="sb-items"></div>
  </aside>

  <!-- КОНТЕНТ -->
  <main id="content">

    <!-- Колесо -->
    <div id="wheel-panel" class="panel active">
      <div id="wheel-btn"><button class="btn" id="spin-btn" style="width:100%">🎰&nbsp;&nbsp;Крутить!</button></div>
      <div id="wheel-status"><div class="ws-idle">Выбери список и нажми крутить</div></div>
      <div id="wheel-wrap">
        <canvas id="wcanvas" width="540" height="540"></canvas>
        <div id="wheel-ptr"></div>
      </div>
    </div>

    <!-- Монетка -->
    <div id="coin-panel" class="panel">
      <div id="coin-face">🪙</div>
      <div id="coin-result"></div>
      <div id="coin-btn-wrap"><button class="btn" id="coin-btn" style="width:100%">🪙&nbsp;&nbsp;Подбросить монетку!</button></div>
    </div>

    <!-- Списки -->
    <div id="lists-panel" class="panel">
      <div id="lists-inner">

        <!-- Создать -->
        <div>
          <div class="sec-title">➕ Новый список</div>
          <div class="frow">
            <label class="flabel">Название</label>
            <input class="inp" id="new-name" placeholder="например: города" autocomplete="off">
          </div>
          <div class="frow">
            <label class="flabel">Элементы (каждый с новой строки)</label>
            <textarea class="inp" id="new-items" placeholder="Москва&#10;Санкт-Петербург&#10;Казань"></textarea>
          </div>
          <button class="btn" id="create-btn" style="width:100%">Создать список</button>
        </div>

        <!-- Редактировать -->
        <div>
          <div class="sec-title">✏️ Редактировать список</div>
          <div id="no-lists-hint">Создай первый список слева ←</div>
          <div id="edit-section">
            <div class="frow">
              <label class="flabel">Список</label>
              <div class="csel">
                <div class="csel-trigger" id="csel-trigger">
                  <span id="csel-val">—</span>
                  <span class="csel-arrow">▼</span>
                </div>
                <div class="csel-drop" id="csel-drop"></div>
              </div>
            </div>
            <div class="flabel">Элементы:</div>
            <div id="edit-rows"></div>
            <div class="add-row">
              <input class="inp" id="add-name" placeholder="Новый элемент" autocomplete="off">
              <input class="inp" id="add-w" type="number" value="1" min="0.1" step="0.1">
              <button class="btn sm" id="add-btn">➕</button>
            </div>
            <hr class="div">
            <div style="display:flex;gap:10px">
              <button class="btn" id="save-btn" style="flex:1">💾&nbsp; Сохранить</button>
              <button class="btn danger sm" id="del-btn">🗑 Удалить</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>
<div id="toast"></div>

<script>
'use strict';

/* ── BRIDGE ─────────────────────────────────────────── */
// pywebview инжектирует window.pywebview.api после загрузки страницы
// Ждём событие pywebviewready
let py = null;

window.addEventListener('pywebviewready', () => {
  // Оборачиваем API в промис-совместимый интерфейс
  // pywebview возвращает Promise, а наш код ждёт колбэк — адаптируем
  py = new Proxy(window.pywebview.api, {
    get(target, method) {
      return (...args) => {
        // Последний аргумент — колбэк (старый стиль QWebChannel)
        const cb = typeof args[args.length - 1] === 'function' ? args.pop() : null;
        const promise = target[method](...args);
        if (cb) promise.then(cb).catch(err => console.error(method, err));
        return promise;
      };
    }
  });
  init();

  // Проверяем папку с шаблонами — показываем путь если создалась впервые
  py.get_storage_info(raw => {
    const info = JSON.parse(raw);
    if (info.just_created) {
      toastLong(`📁 Папка для шаблонов создана: ${info.path}`);
    }
  });
});

/* ── STATE ──────────────────────────────────────────── */
const S = {
  lists:      {},
  active:     null,
  editTarget: null,
  editBuf:    [],
  wAngle:     0,
  wBusy:      false,
  coinBusy:   false,
};

/* ── INIT ───────────────────────────────────────────── */
function init() {
  initTabs();
  initWheel();
  initCoin();
  initLists();
  loadLists();
}

/* ── TABS ───────────────────────────────────────────── */
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById(b.dataset.tab + '-panel').classList.add('active');
    });
  });
}

/* ── DATA ───────────────────────────────────────────── */
function loadLists(selectName) {
  py.get_lists(raw => {
    S.lists = JSON.parse(raw);
    const names = Object.keys(S.lists);
    renderSidebar(names);
    renderEditSelect(names);

    const pick = selectName && names.includes(selectName) ? selectName
               : S.active   && names.includes(S.active)   ? S.active
               : names[0] || null;
    setActive(pick);

    if (S.editTarget && names.includes(S.editTarget)) loadEditTarget(S.editTarget);
    else if (names.length) loadEditTarget(names[0]);
  });
}

function setActive(name) {
  S.active = name;
  document.querySelectorAll('.sl-item').forEach(el =>
    el.classList.toggle('active', el.dataset.n === name));
  renderSbItems();
  drawWheel(S.wAngle);
}

/* ── SIDEBAR ────────────────────────────────────────── */
function renderSidebar(names) {
  const w = document.getElementById('sb-lists');
  if (!names.length) { w.innerHTML = '<div style="color:var(--muted);font-size:12px">Нет списков</div>'; return; }
  w.innerHTML = names.map(n => `
    <div class="sl-item${n===S.active?' active':''}" data-n="${x(n)}">
      <span>${x(n)}</span><span class="sl-cnt">${(S.lists[n]||[]).length}</span>
    </div>`).join('');
  w.querySelectorAll('.sl-item').forEach(el =>
    el.addEventListener('click', () => setActive(el.dataset.n)));
}

function renderSbItems() {
  const w = document.getElementById('sb-items');
  const items = S.active ? (S.lists[S.active]||[]) : [];
  if (!items.length) { w.innerHTML=''; return; }
  w.innerHTML = items.map(it =>
    `<div class="sb-row"><span>${x(it.name)}</span><span class="sb-w">×${it.weight}</span></div>`
  ).join('');
}

/* ── TOAST ──────────────────────────────────────────── */
let _tt;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 2600);
}

function toastLong(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 6000);
}

/* ── WHEEL ──────────────────────────────────────────── */
const PAL = ['#ff3366','#ff6b2b','#ffb830','#00c9a7','#4facfe','#a855f7','#ec4899','#10b981','#f59e0b','#3b82f6','#ef4444','#8b5cf6'];
const SPIN_MS = 4500;

function initWheel() {
  document.getElementById('spin-btn').addEventListener('click', doSpin);
}

function curItems() { return S.active ? (S.lists[S.active]||[]) : []; }
function twt(items) { return items.reduce((s,i) => s+(parseFloat(i.weight)||1), 0); }

function drawWheel(a) {
  const canvas = document.getElementById('wcanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = W/2 - 8;
  ctx.clearRect(0,0,W,H);
  const items = curItems();
  if (!items.length) {
    ctx.fillStyle='#1a1a1f'; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.font='14px Inter'; ctx.textAlign='center'; ctx.fillText('Нет элементов',cx,cy);
    return;
  }
  const total = twt(items);
  let s = a;
  items.forEach((item,i) => {
    const sl = (parseFloat(item.weight)||1)/total*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,s,s+sl); ctx.closePath();
    ctx.fillStyle=PAL[i%PAL.length]; ctx.fill();
    ctx.strokeStyle='#0d0d0f'; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+sl/2);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,.95)';
    const fs=Math.max(10,Math.min(14,260/items.length));
    ctx.font=`700 ${fs}px 'Unbounded',sans-serif`;
    ctx.shadowColor='rgba(0,0,0,.6)'; ctx.shadowBlur=4;
    const lbl=item.name.length>13?item.name.slice(0,13)+'…':item.name;
    ctx.fillText(lbl,R-14,fs/3); ctx.restore();
    s+=sl;
  });
  ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2);
  ctx.fillStyle='#0d0d0f'; ctx.fill(); ctx.strokeStyle='#2a2a30'; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=10; ctx.stroke();
}

function wheelStatus(type, name='') {
  const el = document.getElementById('wheel-status');
  if (type==='idle')   el.innerHTML='<div class="ws-idle">Выбери список и нажми крутить</div>';
  else if (type==='spin') el.innerHTML='<div class="ws-spin">⏳&nbsp;&nbsp;Крутится...</div>';
  else el.innerHTML=`<div class="ws-winner"><div class="ws-wlabel">🏆 Победитель</div><div class="ws-wname">${x(name)}</div></div>`;
}

function targetAngle(winner) {
  const items=curItems(), total=twt(items); let acc=0;
  for (const it of items) {
    const sl=(parseFloat(it.weight)||1)/total*Math.PI*2;
    if (it.name===winner) return -(acc+sl/2);
    acc+=sl;
  }
  return 0;
}

function easeOut(t) { return 1-Math.pow(1-t,4); }

function doSpin() {
  const items=curItems();
  if (!items.length||S.wBusy) return;
  const btn=document.getElementById('spin-btn');
  btn.disabled=true;
  py.weighted_choice(JSON.stringify(items), winner => {
    if (!winner) { btn.disabled=false; return; }
    S.wBusy=true; wheelStatus('spin');
    const raw=targetAngle(winner);
    const norm=((raw%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    const cur=((S.wAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    let d=norm-cur; if(d<=0) d+=Math.PI*2;
    const final=S.wAngle+d+(5+Math.floor(Math.random()*4))*Math.PI*2;
    const t0=performance.now(), sa=S.wAngle;
    function frame(now) {
      const t=Math.min((now-t0)/SPIN_MS,1);
      S.wAngle=sa+(final-sa)*easeOut(t); drawWheel(S.wAngle);
      if(t<1) requestAnimationFrame(frame);
      else { S.wAngle=final; S.wBusy=false; btn.disabled=false; wheelStatus('winner',winner); }
    }
    requestAnimationFrame(frame);
  });
}

/* ── COIN ───────────────────────────────────────────── */
function initCoin() {
  document.getElementById('coin-btn').addEventListener('click', doFlip);
}

function doFlip() {
  if (S.coinBusy) return;
  S.coinBusy=true;
  const btn=document.getElementById('coin-btn');
  const face=document.getElementById('coin-face');
  const res=document.getElementById('coin-result');
  btn.disabled=true; res.classList.remove('show');
  face.textContent='🪙';
  py.coin_flip(r => {
    face.classList.remove('flipping'); void face.offsetWidth; face.classList.add('flipping');
    setTimeout(()=>{
      face.textContent=r==='Орёл'?'🦅':'🌀';
      res.textContent=r; res.classList.add('show');
      S.coinBusy=false; btn.disabled=false;
    },750);
  });
}

/* ── LISTS ──────────────────────────────────────────── */
function initLists() {
  document.getElementById('create-btn').addEventListener('click', createList);
  document.getElementById('new-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('new-items').focus(); });
  document.getElementById('add-btn').addEventListener('click', addItem);
  document.getElementById('add-name').addEventListener('keydown', e => { if(e.key==='Enter') addItem(); });
  document.getElementById('save-btn').addEventListener('click', saveList);
  document.getElementById('del-btn').addEventListener('click', deleteList);

  // кастомный дропдаун
  const trigger=document.getElementById('csel-trigger');
  const drop=document.getElementById('csel-drop');
  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const open=drop.classList.contains('open');
    closeDrops();
    if (!open) { drop.classList.add('open'); trigger.classList.add('open'); }
  });
  document.addEventListener('click', closeDrops);
}

function closeDrops() {
  document.querySelectorAll('.csel-drop.open').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.csel-trigger.open').forEach(t=>t.classList.remove('open'));
}

function renderEditSelect(names) {
  const drop=document.getElementById('csel-drop');
  const val=document.getElementById('csel-val');
  const has=names.length>0;
  document.getElementById('no-lists-hint').style.display=has?'none':'block';
  document.getElementById('edit-section').style.display=has?'block':'none';
  if (!has) return;
  drop.innerHTML=names.map(n=>`<div class="csel-opt${n===S.editTarget?' selected':''}" data-v="${x(n)}">${x(n)}</div>`).join('');
  drop.querySelectorAll('.csel-opt').forEach(opt=>{
    opt.addEventListener('click', e=>{
      e.stopPropagation(); closeDrops();
      drop.querySelectorAll('.csel-opt').forEach(o=>o.classList.toggle('selected',o===opt));
      val.textContent=opt.dataset.v;
      loadEditTarget(opt.dataset.v);
    });
  });
  const cur=S.editTarget&&names.includes(S.editTarget)?S.editTarget:names[0];
  val.textContent=cur||'—';
}

function loadEditTarget(name) {
  S.editTarget=name;
  S.editBuf=JSON.parse(JSON.stringify(S.lists[name]||[]));
  document.getElementById('csel-val').textContent=name;
  // обновить selected в дропдауне
  document.querySelectorAll('.csel-opt').forEach(o=>o.classList.toggle('selected',o.dataset.v===name));
  renderEditRows();
}

function renderEditRows() {
  const w=document.getElementById('edit-rows');
  w.innerHTML=S.editBuf.map((it,i)=>`
    <div class="erow">
      <input class="inp" value="${x(it.name)}" data-i="${i}" data-f="name" autocomplete="off">
      <input class="inp" type="number" value="${it.weight}" min="0.1" step="0.1" data-i="${i}" data-f="weight">
      <button class="ibtn" data-d="${i}">🗑</button>
    </div>`).join('');
  w.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const i=+inp.dataset.i,f=inp.dataset.f;
      S.editBuf[i][f]=f==='weight'?parseFloat(inp.value)||0.1:inp.value;
    });
  });
  w.querySelectorAll('[data-d]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.editBuf.splice(+btn.dataset.d,1); renderEditRows();
    });
  });
}

function addItem() {
  const n=document.getElementById('add-name');
  const w=document.getElementById('add-w');
  if (!n.value.trim()) { n.focus(); return; }
  S.editBuf.push({name:n.value.trim(),weight:parseFloat(w.value)||1});
  n.value=''; w.value='1'; n.focus(); renderEditRows();
}

function saveList() {
  if (!S.editTarget) return;
  py.save_list(S.editTarget,JSON.stringify(S.editBuf),raw=>{
    const r=JSON.parse(raw);
    if(r.ok) { toast(`✅ Список «${S.editTarget}» сохранён!`); loadLists(S.editTarget); }
    else toast(`❌ ${r.error}`,'error');
  });
}

function createList() {
  const name=document.getElementById('new-name').value.trim();
  const raw=document.getElementById('new-items').value;
  if (!name)      { toast('Укажи название','error'); return; }
  if (!raw.trim()){ toast('Добавь элементы','error'); return; }
  const items=raw.split('\n').map(l=>l.trim()).filter(Boolean).map(n=>({name:n,weight:1.0}));
  py.save_list(name,JSON.stringify(items),raw=>{
    const r=JSON.parse(raw);
    if(r.ok){
      document.getElementById('new-name').value='';
      document.getElementById('new-items').value='';
      toast(`✅ Список «${name}» создан!`); loadLists(name);
    } else toast(`❌ ${r.error}`,'error');
  });
}

function deleteList() {
  if (!S.editTarget) return;
  if (!confirm(`Удалить список «${S.editTarget}»?`)) return;
  py.delete_list(S.editTarget,raw=>{
    const r=JSON.parse(raw);
    if(r.ok){ toast('🗑 Список удалён'); loadLists(); }
    else toast(`❌ ${r.error}`,'error');
  });
}

/* ── ESC ────────────────────────────────────────────── */
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
